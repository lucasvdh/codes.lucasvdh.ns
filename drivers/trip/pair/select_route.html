<div class="form-wrapper">
  <p class="hint" data-i18n="pair.intro"></p>

  <fieldset class="homey-form-fieldset">
    <div class="homey-form-group">
      <label class="homey-form-label" data-i18n="pair.from"></label>
      <input class="homey-form-input" id="fromInput" type="text" autocomplete="off" />
      <div id="fromResults" class="results"></div>
      <div id="fromSelected" class="selected"></div>
    </div>

    <div class="homey-form-group">
      <label class="homey-form-label" data-i18n="pair.to"></label>
      <input class="homey-form-input" id="toInput" type="text" autocomplete="off" />
      <div id="toResults" class="results"></div>
      <div id="toSelected" class="selected"></div>
    </div>
  </fieldset>

  <p id="status" class="status"></p>
  <p id="err" class="alert hidden"></p>
</div>

<script type="application/javascript">
  const state = { from: null, to: null };

  Homey.setTitle(Homey.__('pair.title'));

  // Apply data-i18n labels and placeholders
  document.querySelectorAll('[data-i18n]').forEach(function (el) {
    el.textContent = Homey.__(el.getAttribute('data-i18n'));
  });
  document.getElementById('fromInput').placeholder = Homey.__('pair.type_min_chars');
  document.getElementById('toInput').placeholder = Homey.__('pair.type_min_chars');

  function showError(msg) {
    const err = document.getElementById('err');
    if (msg && msg.message) msg = msg.message;
    if (typeof msg !== 'string') msg = Homey.__('pair.error_generic');
    err.textContent = msg;
    err.classList.remove('hidden');
  }

  function clearError() {
    document.getElementById('err').classList.add('hidden');
  }

  function updateStatus() {
    const status = document.getElementById('status');
    if (state.from && state.to) {
      status.textContent = Homey.__('pair.ready');
      status.className = 'status ready';
    } else if (state.from || state.to) {
      status.textContent = state.from ? Homey.__('pair.now_pick_to') : Homey.__('pair.now_pick_from');
      status.className = 'status';
    } else {
      status.textContent = '';
      status.className = 'status';
    }
  }

  function persistRouteIfReady() {
    if (state.from && state.to) {
      Homey.emit('set_route', { from: state.from, to: state.to })
        .then(clearError)
        .catch(showError);
    } else {
      Homey.emit('clear_route', null).catch(function () {});
    }
  }

  function bind(role) {
    const input = document.getElementById(role + 'Input');
    const results = document.getElementById(role + 'Results');
    const selected = document.getElementById(role + 'Selected');

    let timer;
    input.addEventListener('input', function () {
      clearTimeout(timer);
      const q = input.value.trim();
      if (q.length < 2) { results.innerHTML = ''; return; }
      timer = setTimeout(function () {
        Homey.emit('search', q)
          .then(function (stations) { renderResults(stations || [], role); })
          .catch(showError);
      }, 250);
    });

    function renderResults(stations, role) {
      results.innerHTML = '';
      stations.slice(0, 12).forEach(function (s) {
        const div = document.createElement('div');
        div.className = 'result';
        div.textContent = s.name + (s.country && s.country !== 'NL' ? ' (' + s.country + ')' : '');
        div.addEventListener('click', function () { pick(s, role); });
        results.appendChild(div);
      });
    }

    function pick(station, role) {
      state[role] = station;
      input.value = '';
      results.innerHTML = '';
      selected.innerHTML = station.name + ' <button type="button" class="clear" aria-label="Clear">×</button>';
      selected.style.display = 'block';
      selected.querySelector('.clear').addEventListener('click', function () {
        state[role] = null;
        selected.style.display = 'none';
        updateStatus();
        persistRouteIfReady();
      });
      updateStatus();
      persistRouteIfReady();
    }
  }

  bind('from');
  bind('to');
  updateStatus();
</script>

<style type="text/css">
  .form-wrapper { padding: 8px; }
  .hint { color: #555; margin: 0 0 12px; }
  .results { margin-top: 4px; max-height: 180px; overflow-y: auto; }
  .result { padding: 8px 10px; cursor: pointer; border-bottom: 1px solid #eee; }
  .result:hover { background: #f7f7f7; }
  .selected { display: none; margin-top: 6px; padding: 8px 10px; background: #e6f0ff; border-radius: 4px; font-weight: 600; }
  .selected .clear { float: right; background: none; border: 0; color: #999; cursor: pointer; font-size: 16px; padding: 0 4px; }
  .status { margin-top: 12px; color: #555; font-size: 13px; min-height: 1em; }
  .status.ready { color: #1f6f1f; font-weight: 600; }
  .alert { margin-top: 12px; padding: 8px 10px; background: #fbeaea; color: #8a1f1f; border-radius: 4px; }
  .hidden { display: none; }
</style>
