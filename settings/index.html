<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>NS</title>
  <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; padding: 16px; max-width: 560px; }
    h1 { font-size: 18px; margin: 0 0 8px; }
    p { color: #555; line-height: 1.4; }
    label { display: block; font-weight: 600; margin: 16px 0 6px; }
    input[type=password], input[type=text] {
      width: 100%; padding: 10px; box-sizing: border-box;
      border: 1px solid #ccc; border-radius: 6px; font-size: 14px;
    }
    button {
      margin-top: 12px; padding: 10px 16px; border: 0; border-radius: 6px;
      background: #FFC917; color: #000; font-weight: 600; cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: #eee; color: #333; }
    button + button { margin-left: 8px; }
    .status { margin-top: 12px; padding: 10px; border-radius: 6px; font-size: 14px; display: none; transition: opacity 0.4s; }
    .status.ok  { background: #e6f6e6; color: #1f6f1f; display: block; }
    .status.err { background: #fbeaea; color: #8a1f1f; display: block; }
    .status.info { background: #eef3fa; color: #1f4d8a; display: block; }
    .status.fade { opacity: 0; }
    a { color: #0066cc; }
  </style>
</head>
<body>
  <h1 id="title">NS API Key</h1>
  <p id="intro"></p>

  <label for="apiKey" id="keyLabel">Subscription Key</label>
  <input type="password" id="apiKey" autocomplete="off" />

  <button id="save">Save</button>
  <button id="test" class="secondary">Test connection</button>

  <div id="status" class="status"></div>

  <script>
    function onHomeyReady(Homey) {
      const apiKeyEl = document.getElementById('apiKey');
      const statusEl = document.getElementById('status');
      const saveBtn = document.getElementById('save');
      const testBtn = document.getElementById('test');
      const titleEl = document.getElementById('title');
      const introEl = document.getElementById('intro');
      const keyLabelEl = document.getElementById('keyLabel');

      const t = function (key, vars) { return Homey.__(key, vars); };

      titleEl.textContent = t('settings.title');
      introEl.innerHTML = t('settings.intro_pre')
        + ' <a href="https://apiportal.ns.nl/" target="_blank" rel="noopener">apiportal.ns.nl</a> '
        + t('settings.intro_post');
      keyLabelEl.textContent = t('settings.key_label');
      apiKeyEl.placeholder = t('settings.key_placeholder');
      saveBtn.textContent = t('settings.save');
      testBtn.textContent = t('settings.test_connection');

      let fadeTimer = null;
      let clearTimer = null;

      function showStatus(msg, kind, autoClearMs) {
        clearTimeout(fadeTimer);
        clearTimeout(clearTimer);
        statusEl.textContent = msg;
        statusEl.className = 'status ' + kind;
        if (autoClearMs) {
          fadeTimer = setTimeout(function () {
            statusEl.classList.add('fade');
          }, autoClearMs);
          clearTimer = setTimeout(function () {
            statusEl.className = 'status';
            statusEl.textContent = '';
          }, autoClearMs + 400);
        }
      }

      function describeHttpError(status) {
        if (status === 401 || status === 403) return t('settings.err_key_rejected', { status: status });
        if (status === 429) return t('settings.err_rate_limited');
        if (status >= 500) return t('settings.err_api_error', { status: status });
        return t('settings.err_status', { status: status });
      }

      function disable(disabled) {
        saveBtn.disabled = disabled;
        testBtn.disabled = disabled;
      }

      function testKey(key) {
        const url = 'https://gateway.apiportal.ns.nl/reisinformatie-api/api/v2/stations?q=amsterdam&limit=1';
        return fetch(url, { headers: { 'Ocp-Apim-Subscription-Key': key, Accept: 'application/json' } })
          .then(function (r) {
            if (r.ok) return { ok: true };
            return { ok: false, message: describeHttpError(r.status) };
          })
          .catch(function (e) { return { ok: false, message: t('settings.err_network', { message: e.message || String(e) }) }; });
      }

      Homey.get('apiKey', function (err, value) {
        if (!err && value) apiKeyEl.value = value;
        Homey.ready();
      });

      saveBtn.addEventListener('click', function () {
        const key = apiKeyEl.value.trim();
        if (!key) { showStatus(t('settings.enter_key_first'), 'err'); return; }
        Homey.set('apiKey', key, function (err) {
          if (err) return showStatus(t('settings.save_failed', { error: err }), 'err');
          showStatus(t('settings.saved'), 'ok', 3000);
        });
      });

      testBtn.addEventListener('click', function () {
        const key = apiKeyEl.value.trim();
        if (!key) { showStatus(t('settings.enter_key_first'), 'err'); return; }
        showStatus(t('settings.testing'), 'info');
        disable(true);
        testKey(key).then(function (result) {
          disable(false);
          if (result.ok) showStatus(t('settings.key_works'), 'ok', 4000);
          else showStatus(result.message, 'err');
        });
      });
    }
  </script>
</body>
</html>
